<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review 任务 - video-review</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
    main { max-width: 1040px; margin: 0 auto; padding: 32px 18px; }
    a { color: #93c5fd; }
    .card { background: #111827; border: 1px solid #374151; border-radius: 16px; padding: 20px; margin: 16px 0; }
    code { background: #020617; padding: 2px 6px; border-radius: 6px; }
    .muted { color: #9ca3af; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #374151; vertical-align: top; }
    .button { display: inline-block; background: #2563eb; color: white; text-decoration: none; border-radius: 10px; padding: 10px 14px; border: none; cursor: pointer; font-size: 14px; }
    .form label { display: block; margin: 12px 0 4px; }
    .form input[type="text"] { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #374151; background: #020617; color: #e5e7eb; box-sizing: border-box; }
    .form input[type="checkbox"] { margin-right: 6px; }
    .form button { margin-top: 14px; }
  </style>
</head>
<body>
<main>
  <p><a href="/">← 首页</a></p>
  <h1>Review 任务</h1>

  <div class="card">
    <h2>创建 Review 任务</h2>
    <form method="post" action="/jobs" class="form">
      <label>任务名称<br><input type="text" name="name" required placeholder="例如：下载目录整理"></label>
      <label>扫描路径<br><input type="text" name="scan_path" required placeholder="{{ app_settings.download_root }}"></label>
      <label>备注<br><input type="text" name="notes" placeholder="可选"></label>
      <label><input type="checkbox" name="scan_now" value="true" checked> 创建后立即扫描</label>
      <button type="submit" class="button">创建任务</button>
    </form>
  </div>

  <div class="card">
    <h2>任务列表</h2>
    {% if jobs %}
      <table>
        <thead>
        <tr>
          <th>任务</th>
          <th>路径</th>
          <th>状态</th>
          <th>进度</th>
          <th>创建时间</th>
        </tr>
        </thead>
        <tbody>
        {% for job in jobs %}
          <tr>
            <td><a href="/jobs/{{ job.job_id }}">{{ job.name }}</a><br><code>{{ job.job_id }}</code></td>
            <td><code>{{ job.scan_path }}</code></td>
            <td>{{ job.status }}</td>
            <td>{{ job.reviewed_items }} / {{ job.total_items }}</td>
            <td>{{ job.created_at }}</td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p class="muted">还没有 Review 任务。使用上方表单创建第一个任务。</p>
    {% endif %}
  </div>
</main>
</body>
</html>
